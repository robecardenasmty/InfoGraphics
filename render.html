<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="firebase-config.js"></script>
<script type="module" src="firebase-bridge.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;width:100%;background:transparent !important;background-color:rgba(0,0,0,0) !important;overflow:hidden;}
</style>
</helmet>

<div style="{{ rootStyle }}">
  <div ref="{{ fitRef }}" style="{{ scaleWrap }}">
    <video ref="{{ videoRef }}" style="{{ videoStyle }}" playsinline="{{ true }}"></video>
    <sc-if value="{{ supShown }}" hint-placeholder-val="{{ false }}">
      <div style="{{ supWrap }}">
        <div style="{{ supBar }}">
          <div style="{{ supSpine }}"></div>
          <div style="padding:14px 26px 16px 22px;">
            <div style="{{ supNameStyle }}">{{ supName }}</div>
            <div style="{{ supRoleStyle }}">{{ supRole }}</div>
          </div>
        </div>
      </div>
    </sc-if>
    <div style="{{ gfxLayer }}">
      <sc-if value="{{ hasProgram }}" hint-placeholder-val="{{ false }}">
        <dc-import name="Grafico" gstate="{{ program }}" animate="{{ true }}" tickers="{{ tickers }}" hint-size="1920px,1080px"></dc-import>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.fitRef = React.createRef();
    this.videoRef = React.createRef();
    this.state = { program:null, tickers:{}, scale:1, _pgm:-1, vidShown:false, vidUrl:'', vidMuted:true, _vk:-1, supName:'', supRole:'', supShown:false };
  }
  componentDidMount(){
    this.fit(); this._onR=()=>this.fit(); window.addEventListener('resize',this._onR);
    try{ this.chan=new BroadcastChannel('info7_graphics'); this.chan.onmessage=(e)=>{ const d=e.data; if(d&&d.type==='program') this.onData(d.payload); }; }catch(e){ this.chan=null; }
    try{ const raw=localStorage.getItem('info7_program'); if(raw){ const d=JSON.parse(raw); this.onData(d.payload||d); } }catch(e){}
    this._poll=setInterval(()=>{ try{ const raw=localStorage.getItem('info7_program'); if(!raw)return; const d=JSON.parse(raw); const sig=raw; if(sig!==this._sig){ this._sig=sig; this.onData(d.payload||d); } }catch(e){} },300);
    this._fbSub();
    window.addEventListener('info7-fb-ready', this._fbReady=()=>this._fbSub());
    try{ if(this.chan) this.chan.postMessage({type:'hello'}); }catch(e){}
    // ----- canal de VIDEO -----
    try{ this.vchan=new BroadcastChannel('info7_video'); this.vchan.onmessage=(e)=>this.onVideo(e.data); }catch(e){ this.vchan=null; }
    try{ const raw=localStorage.getItem('info7_video'); if(raw){ this.onVideo(JSON.parse(raw)); } }catch(e){}
    this._vpoll=setInterval(()=>{ try{ const raw=localStorage.getItem('info7_video'); if(!raw)return; if(raw!==this._vsig){ this._vsig=raw; this.onVideo(JSON.parse(raw)); } }catch(e){} },250);
    this._vfbSub();
    window.addEventListener('info7-fb-ready', this._vfbReady=()=>this._vfbSub());
  }
  componentWillUnmount(){ window.removeEventListener('resize',this._onR); if(this._fbReady) window.removeEventListener('info7-fb-ready',this._fbReady); if(this._vfbReady) window.removeEventListener('info7-fb-ready',this._vfbReady); if(this.chan)this.chan.close(); if(this.vchan)this.vchan.close(); if(this._poll)clearInterval(this._poll); if(this._vpoll)clearInterval(this._vpoll); }
  _fbSub(){ if(this._fbSubbed||!window.INFO7_FIREBASE) return; this._fbSubbed=true; try{ window.INFO7_FIREBASE.subscribe((p)=>this.onData(p)); }catch(e){} }
  _vfbSub(){ if(this._vfbSubbed||!window.INFO7_FIREBASE_VIDEO) return; this._vfbSubbed=true; try{ window.INFO7_FIREBASE_VIDEO.subscribe((p)=>this.onVideo(p)); }catch(e){} }

  onVideo(p){
    if(!p||!p.action) return;
    if((p.key||0)===this._vk && p.action!=='preload') return;
    const v=this.videoRef.current;
    if(p.action==='preload'){
      if(v && p.url && v.getAttribute('data-src')!==p.url){ v.src=p.url; v.setAttribute('data-src',p.url); v.muted=true; try{v.load();}catch(e){} }
      return;
    }
    if(p.action==='super'){ this.setState({supShown:true, supName:p.name||'', supRole:p.role||''}); return; }
    if(p.action==='super-hide'){ this.setState({supShown:false}); return; }
    if(p.action==='stop'){
      this._vk=p.key||0;
      if(v){ try{v.pause();}catch(e){} }
      this.setState({vidShown:false, supShown:false});
      return;
    }
    if(p.action==='play'){
      this._vk=p.key||0;
      const muted = p.mode!=='nota';
      this.setState({vidShown:true, vidUrl:p.url||'', vidMuted:muted}, ()=>{
        const vv=this.videoRef.current; if(!vv) return;
        if(p.url && vv.getAttribute('data-src')!==p.url){ vv.src=p.url; vv.setAttribute('data-src',p.url); }
        vv.muted=muted; vv.loop=!!p.loop;
        try{ vv.currentTime=0; }catch(e){}
        const pr=vv.play(); if(pr&&pr.catch) pr.catch(()=>{ vv.muted=true; vv.play().catch(()=>{}); });
      });
    }
  }

  onData(p){
    if(!p||!p.program) return;
    if((p.pgmId||0)!==this.state._pgm){
      this.setState({ _pgm:p.pgmId||0, program:p.program, tickers:p.tickers||{} });
    } else {
      this.setState({ tickers:p.tickers||{} });
    }
  }

  fit(){ const el=this.fitRef.current; if(!el) return; const w=window.innerWidth, h=window.innerHeight; const s=Math.min(w/1920, h/1080); if(s>0 && Math.abs(s-this.state.scale)>0.0008) this.setState({scale:s}); }

  renderVals(){
    const s=this.state;
    return {
      rootStyle:{position:'fixed',inset:'0',width:'100vw',height:'100vh',overflow:'hidden',background:'transparent'},
      scaleWrap:{position:'absolute',left:'50%',top:'50%',width:'1920px',height:'1080px',transform:`translate(-50%,-50%) scale(${s.scale})`,transformOrigin:'center center'},
      fitRef:this.fitRef,
      videoRef:this.videoRef,
      videoStyle:{position:'absolute',inset:'0',width:'1920px',height:'1080px',objectFit:'cover',background:'#000',zIndex:'1',display: s.vidShown?'block':'none'},
      gfxLayer:{position:'absolute',inset:'0',width:'1920px',height:'1080px',zIndex:'2'},
      supShown:s.supShown, supName:s.supName, supRole:s.supRole,
      supWrap:{position:'absolute',left:'90px',bottom:'150px',zIndex:'3',filter:'drop-shadow(0 18px 34px rgba(0,0,0,.45))'},
      supBar:{display:'flex',alignItems:'stretch',background:'linear-gradient(180deg,#ffffff,#eef1f5)',borderRadius:'0 14px 14px 0',overflow:'hidden',minWidth:'520px'},
      supSpine:{width:'12px',background:'linear-gradient(180deg,#0b3c8c,#072a66)',flex:'none'},
      supNameStyle:{fontFamily:"'Saira Condensed','Oswald',sans-serif",fontWeight:'800',fontSize:'46px',lineHeight:'1',letterSpacing:'.01em',color:'#11243f',textTransform:'uppercase'},
      supRoleStyle:{fontFamily:"'Barlow',system-ui,sans-serif",fontWeight:'600',fontSize:'24px',color:'#52627a',marginTop:'5px',textTransform:'uppercase',letterSpacing:'.03em'},
      hasProgram: !!s.program,
      program:s.program, tickers:s.tickers,
    };
  }
}
</script>
<template id="__bundler_thumbnail" data-bg-color="#0a1322">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0a1322"/>
    <rect x="250" y="300" width="200" height="200" rx="34" fill="#003399"/>
    <rect x="250" y="440" width="200" height="60" fill="#ba0000"/>
    <rect x="250" y="300" width="200" height="200" rx="34" fill="none" stroke="#29abe2" stroke-width="10"/>
    <text x="350" y="375" font-family="Arial" font-weight="800" font-size="60" fill="#fff" text-anchor="middle">INFO</text>
    <text x="350" y="478" font-family="Arial" font-weight="800" font-size="92" fill="#fff" text-anchor="middle">7</text>
    <rect x="480" y="330" width="370" height="54" fill="#003399"/>
    <rect x="480" y="392" width="520" height="84" fill="#fff"/>
    <rect x="480" y="392" width="520" height="6" fill="#29abe2"/>
  </svg>
</template>
</body>
</html>
